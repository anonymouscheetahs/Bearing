<script>
// --- Add new variables ---
let exitLocation = null;
let exitReached = false;

function checkCandy(){
  candyLocations.forEach((loc,i)=>{
    if(!candiesFound[i] && player.x===loc.x && player.y===loc.y) {
      candiesFound[i]=true;
      console.log(`Collected candy ${i} at ${loc.x},${loc.y}`);
    }
  });

  // If all candies collected and exit not yet created
  if(candiesFound.every(Boolean) && !exitLocation){
    generateExit();
  }

  // Check if player reached exit
  if(exitLocation && player.x===exitLocation.x && player.y===exitLocation.y){
    exitReached = true;
  }
}

// --- Generate exit tile ---
function generateExit(){
  while(true){
    let x = Math.floor(Math.random()*SIZE);
    let y = Math.floor(Math.random()*SIZE);
    if(candyLocations.some(c=>c.x===x&&c.y===y) || (x===player.x && y===player.y)) continue;
    exitLocation = {x,y};
    console.log(`Exit created at ${x},${y}`);
    break;
  }
}

// --- Update compass row to include exit ---
function renderCompassRow(){
  const row=document.getElementById('compassRow'); row.innerHTML='';
  // Candy compasses
  candyLocations.forEach((loc,i)=>{
    const comp=document.createElement('div'); comp.className='compass'+(candiesFound[i]?' done':'');
    const needle=document.createElement('div'); needle.className='needle';
    needle.style.transform=`translateX(-50%) rotate(${getBearing(player,loc)}deg)`;
    const tick=document.createElement('div'); tick.className='tick'; tick.textContent='✔';
    comp.appendChild(needle); comp.appendChild(tick); row.appendChild(comp);
  });
  // Exit compass
  if(exitLocation && !exitReached){
    const comp=document.createElement('div'); comp.className='compass';
    const needle=document.createElement('div'); needle.className='needle';
    needle.style.background='#4ade80'; // green for exit
    needle.style.transform=`translateX(-50%) rotate(${getBearing(player,exitLocation)}deg)`;
    comp.appendChild(needle);
    row.appendChild(comp);
  }
}

// --- Render exit on minimap ---
function renderMinimap(){
  const SIZE_CANVAS=canvas.width;
  ctx.clearRect(0,0,SIZE_CANVAS,SIZE_CANVAS);
  const radius=2;
  const cellSize=SIZE_CANVAS/(radius*2+1);
  ctx.save(); ctx.beginPath(); ctx.arc(SIZE_CANVAS/2,SIZE_CANVAS/2,SIZE_CANVAS/2-2,0,Math.PI*2); ctx.clip();
  ctx.fillStyle='rgba(8,10,22,1)'; ctx.fillRect(0,0,SIZE_CANVAS,SIZE_CANVAS);

  for(let dy=-radius;dy<=radius;dy++){
    for(let dx=-radius;dx<=radius;dx++){
      const x=player.x+dx; const y=player.y+dy;
      if(x<0||x>=SIZE||y<0||y>=SIZE) continue;
      const cx=(dx+radius)*cellSize, cy=(dy+radius)*cellSize;
      ctx.fillStyle=visited.has(x+','+y)?'#2e3568':'#0d0f1a';
      ctx.fillRect(cx,cy,cellSize-1,cellSize-1);
      // Candies
      candyLocations.forEach((loc,i)=>{
        if(candiesFound[i] && loc.x===x && loc.y===y){
          ctx.font=Math.max(10,cellSize*0.5)+'px sans-serif';
          ctx.fillText('🍬',cx+cellSize/4,cy+cellSize/1.5);
        }
      });
      // Exit
      if(exitLocation && !exitReached && exitLocation.x===x && exitLocation.y===y){
        ctx.fillStyle='#4ade80';
        ctx.fillRect(cx+cellSize*0.25,cy+cellSize*0.25,cellSize*0.5,cellSize*0.5);
      }
    }
  }
  drawPlayerArrow(SIZE_CANVAS/2,SIZE_CANVAS/2);
  ctx.restore();
}

// --- Update status ---
function updateStatus(){
  if(exitReached){
    document.getElementById('status').textContent='🎉 You Escaped the Endless Halls! 🎉';
  } else if(candiesFound.every(Boolean)){
    document.getElementById('status').textContent='All candies collected! Find the exit!';
  } else {
    document.getElementById('status').textContent='Candies remaining: '+candiesFound.filter(f=>!f).length;
  }
}
</script>
