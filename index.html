<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Endless Candy Halls</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root{
  --bg:#0b0e1a;
  --accent:#3a4091;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:white;
display:flex;
justify-content:center;
}

#game{
width:100%;
max-width:500px;
display:flex;
flex-direction:column;
align-items:center;
padding:10px;
gap:8px;
}

h1{
margin:5px;
text-shadow:0 0 6px var(--accent);
}

#timer{
color:#b4ffb4;
font-weight:bold;
}

#doors{
position:relative;
width:80vw;
max-width:260px;
aspect-ratio:1;
}

.door-img{
position:absolute;
width:70px;
height:100px;
cursor:pointer;
transition:.25s;
}

.door-img:active{
transform:scale(.9);
}

#candies{
display:flex;
gap:8px;
justify-content:center;
}

.candy{
font-size:28px;
opacity:.3;
text-align:center;
}

.candy .info{
font-size:11px;
color:#aaa;
}

.candy.found{
opacity:1;
}

#compassRow{
display:flex;
gap:6px;
}

.compass{
width:40px;
height:40px;
border-radius:50%;
background:#151836;
border:2px solid var(--accent);
position:relative;
}

.needle{
width:2px;
height:18px;
background:red;
position:absolute;
top:6px;
left:50%;
transform-origin:bottom;
}

.tick{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
display:none;
}

.compass.done .tick{
display:block;
}

#status{
font-size:.9em;
}

button{
padding:6px 12px;
background:#3a4091;
border:none;
color:white;
border-radius:4px;
}

#minimapWrap{
position:fixed;
right:10px;
top:10px;
width:130px;
height:130px;
border-radius:50%;
border:3px solid #3a4091;
overflow:hidden;
}

canvas{
width:100%;
height:100%;
}

/* Mobile controls */

#controls{
display:grid;
grid-template-columns:60px 60px 60px;
gap:6px;
margin-top:10px;
}

.ctrl{
background:#1b1f4f;
border-radius:8px;
font-size:20px;
display:flex;
justify-content:center;
align-items:center;
height:50px;
user-select:none;
}

.ctrl:active{
background:#3a4091;
}

@media (min-width:700px){

#controls{
display:none;
}

}

</style>
</head>

<body>

<div id="game">

<h1>Endless Candy Halls</h1>

<div id="timer">Time: 0.0s</div>

<div id="compassRow"></div>

<div id="doors"></div>

<div id="candies"></div>

<div id="status"></div>

<div id="controls">

<div></div>
<div class="ctrl" onclick="move(0,-1)">⬆</div>
<div></div>

<div class="ctrl" onclick="move(-1,0)">⬅</div>
<div></div>
<div class="ctrl" onclick="move(1,0)">➡</div>

<div></div>
<div class="ctrl" onclick="move(0,1)">⬇</div>
<div></div>

</div>

</div>

<div id="minimapWrap">
<canvas id="minimapCanvas" width="150" height="150"></canvas>
</div>

<script>

const SIZE=10
const candyIcons=["🍬","🍭","🍫","🍩","🍪"]

const canvas=document.getElementById("minimapCanvas")
const ctx=canvas.getContext("2d")

let player,visited,maze,candyLocations,candiesFound
let timerInterval,startTime

function initGame(){

player={x:5,y:5,dirX:0,dirY:-1}
visited=new Set([player.x+","+player.y])

maze=[]
candyLocations=[]
candiesFound=[false,false,false,false,false]

clearInterval(timerInterval)
startTime=null

generateMaze()
placeCandies()
renderAll()

}

initGame()

function generateMaze(){

maze=Array.from({length:SIZE},()=>Array.from({length:SIZE},()=>({n:true,s:true,e:true,w:true})))

const stack=[[player.x,player.y]]
const seen=new Set([player.x+","+player.y])

while(stack.length){

const [cx,cy]=stack[stack.length-1]
const neighbors=[]

if(cy>0&&!seen.has(cx+","+(cy-1))) neighbors.push([cx,cy-1,"n","s"])
if(cy<SIZE-1&&!seen.has(cx+","+(cy+1))) neighbors.push([cx,cy+1,"s","n"])
if(cx>0&&!seen.has((cx-1)+","+cy)) neighbors.push([cx-1,cy,"w","e"])
if(cx<SIZE-1&&!seen.has((cx+1)+","+cy)) neighbors.push([cx+1,cy,"e","w"])

if(neighbors.length===0){stack.pop();continue}

const [nx,ny,dir,opp]=neighbors[Math.floor(Math.random()*neighbors.length)]

maze[cy][cx][dir]=false
maze[ny][nx][opp]=false

seen.add(nx+","+ny)
stack.push([nx,ny])

}

}

function placeCandies(){

while(candyLocations.length<5){

let x=Math.floor(Math.random()*SIZE)
let y=Math.floor(Math.random()*SIZE)

if((x===player.x&&y===player.y)||candyLocations.some(c=>c.x===x&&c.y===y)) continue

candyLocations.push({x,y})

}

}

function renderAll(){

renderDoors()
renderCandiesUI()
renderCompassRow()
renderMinimap()
updateStatus()

}

function renderDoors(){

const doors=document.getElementById("doors")
doors.innerHTML=""

const cell=maze[player.y][player.x]

const pos={
n:["50%","0%"],
s:["50%","80%"],
e:["80%","40%"],
w:["0%","40%"]
}

if(!cell.n) createDoor("n",pos.n)
if(!cell.s) createDoor("s",pos.s)
if(!cell.e) createDoor("e",pos.e)
if(!cell.w) createDoor("w",pos.w)

}

function createDoor(dir,[left,top]){

const img=document.createElement("img")
img.src="door.png"
img.className="door-img"

img.style.left=left
img.style.top=top

img.onclick=()=>{

let dx=0,dy=0

if(dir==="n")dy=-1
if(dir==="s")dy=1
if(dir==="e")dx=1
if(dir==="w")dx=-1

move(dx,dy)

}

document.getElementById("doors").appendChild(img)

}

function move(dx,dy){

if(!startTime) startTimer()

const tx=player.x+dx
const ty=player.y+dy

if(tx<0||ty<0||tx>=SIZE||ty>=SIZE) return

player.x=tx
player.y=ty
player.dirX=dx
player.dirY=dy

visited.add(tx+","+ty)

checkCandy()
renderAll()

}

function checkCandy(){

candyLocations.forEach((loc,i)=>{

if(!candiesFound[i]&&loc.x===player.x&&loc.y===player.y)
candiesFound[i]=true

})

}

function renderCandiesUI(){

const bar=document.getElementById("candies")
bar.innerHTML=""

candyLocations.forEach((loc,i)=>{

const div=document.createElement("div")
div.className="candy"+(candiesFound[i]?" found":"")

div.innerHTML=candyIcons[i]+"<div class='info'>"+(candiesFound[i]?"✔":Math.abs(loc.x-player.x)+Math.abs(loc.y-player.y))+"</div>"

bar.appendChild(div)

})

}

function renderCompassRow(){

const row=document.getElementById("compassRow")
row.innerHTML=""

candyLocations.forEach((loc,i)=>{

const c=document.createElement("div")
c.className="compass"+(candiesFound[i]?" done":"")

const n=document.createElement("div")
n.className="needle"

const angle=getBearing(player,loc)

n.style.transform="translateX(-50%) rotate("+angle+"deg)"

const tick=document.createElement("div")
tick.className="tick"
tick.innerText="✔"

c.appendChild(n)
c.appendChild(tick)

row.appendChild(c)

})

}

function renderMinimap(){

ctx.clearRect(0,0,150,150)

ctx.fillStyle="#1a1f44"

visited.forEach(v=>{

const [x,y]=v.split(",").map(Number)

ctx.fillRect(x*15,y*15,14,14)

})

ctx.fillStyle="white"
ctx.fillRect(player.x*15,player.y*15,10,10)

}

function getBearing(a,b){

return (Math.atan2(b.x-a.x,-(b.y-a.y))*180/Math.PI+360)%360

}

function updateStatus(){

const s=document.getElementById("status")

if(candiesFound.every(Boolean)){

stopTimer()

s.innerHTML="🎉 You found all candy!<br>Time: "+getElapsed()+"s <br><button onclick='initGame()'>Play Again</button>"

}else{

s.innerText="Candies remaining: "+candiesFound.filter(f=>!f).length

}

}

function startTimer(){

startTime=Date.now()

timerInterval=setInterval(()=>{

document.getElementById("timer").innerText="Time: "+getElapsed()+"s"

},100)

}

function stopTimer(){

clearInterval(timerInterval)

}

function getElapsed(){

return ((Date.now()-startTime)/1000).toFixed(1)

}

window.addEventListener("keydown",e=>{

if(e.key==="ArrowUp"||e.key==="w") move(0,-1)
if(e.key==="ArrowDown"||e.key==="s") move(0,1)
if(e.key==="ArrowLeft"||e.key==="a") move(-1,0)
if(e.key==="ArrowRight"||e.key==="d") move(1,0)

})

</script>
</body>
</html>
